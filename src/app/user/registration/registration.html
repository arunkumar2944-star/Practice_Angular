<div class="min-h-screen bg-gradient-to-br from-blue-100 via-slate-100 to-indigo-200 flex items-center justify-center p-6">

    <div class="w-full max-w-lg bg-white rounded-2xl shadow-2xl p-8">

        <!-- Logo -->
        <div class="text-center mb-8">

            <div
                class="w-20 h-20 rounded-full bg-blue-600 flex items-center justify-center mx-auto shadow-lg">

                <span class="text-3xl text-white font-bold">A</span>

            </div>

            <h1 class="text-3xl font-bold mt-4 text-gray-800">
                Create Account
            </h1>

            <p class="text-gray-500 mt-2">
                Register to continue
            </p>

        </div>

        <form [formGroup]="userForm" class="space-y-5" (ngSubmit)="this.register()">

            <!-- Name -->
            <div>

                <label class="block mb-2 font-medium text-gray-700">
                    Full Name
                </label>

                <input
                    type="text"
                    formControlName="name"
                    placeholder="Enter your name"
                    class="w-full border rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none">

            </div>

            <!-- Age & Gender -->

            <div class="grid grid-cols-2 gap-4">

                <div>

                    <label class="block mb-2 font-medium text-gray-700">
                        Age
                    </label>

                    <input
                        type="number"
                        formControlName="age"
                        placeholder="Age"
                        class="w-full border rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none">

                </div>

                <div>

                    <label class="block mb-2 font-medium text-gray-700">
                        Gender
                    </label>

                    <select
                    formControlName="gender"
                        class="w-full border rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none">

                        <option value="">Select</option>
                        <option>Male</option>
                        <option>Female</option>
                        <option>Other</option>

                    </select>

                </div>

            </div>

            <!-- Email -->

            <div>

                <label class="block mb-2 font-medium text-gray-700">
                    Email Address
                </label>

                <input
                    type="email"
                    formControlName="email"
                    placeholder="example@gmail.com"
                    class="w-full border rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none">

            </div>

            <!-- Phone -->

            <div>

                <label class="block mb-2 font-medium text-gray-700">
                    Phone Number
                </label>

                <input
                    type="tel"
                    placeholder="9876543210"
                    formControlName="phoneNo"
                    class="w-full border rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none">

            </div>

            <!-- Password -->

            <div>

                <label class="block mb-2 font-medium text-gray-700">
                    Password
                </label>

                <div class="relative">

                    <input
                        [type]="showPassword ? 'text' : 'password'"
                        placeholder="Enter Password"
                        formControlName="password"
                        class="w-full border rounded-xl px-4 py-3 pr-12 focus:ring-2 focus:ring-blue-500 outline-none">

                    <button
                        type="button"
                        (click)="showPassword=!showPassword"
                        class="absolute inset-y-0 right-4 flex items-center text-gray-500">

                        <i
                            class="fa-solid"
                            [class.fa-eye]="!showPassword"
                            [class.fa-eye-slash]="showPassword">
                        </i>

                    </button>

                </div>

            </div>

            <!-- Confirm Password -->

            <div>

                <label class="block mb-2 font-medium text-gray-700">
                    Confirm Password
                </label>

                <div class="relative">

                    <input
                        [type]="showConfirmPassword ? 'text' : 'password'"
                        placeholder="Confirm Password"
                        class="w-full border rounded-xl px-4 py-3 pr-12 focus:ring-2 focus:ring-blue-500 outline-none">

                    <button
                        type="button"
                        (click)="showConfirmPassword=!showConfirmPassword"
                        class="absolute inset-y-0 right-4 flex items-center text-gray-500">

                        <i
                            class="fa-solid"
                            [class.fa-eye]="!showConfirmPassword"
                            [class.fa-eye-slash]="showConfirmPassword">
                        </i>

                    </button>

                </div>

            </div>

            <!-- Register Button -->

            <button
                type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-semibold shadow-lg transition">

                Create Account

            </button>

            <!-- Footer -->

            <p class="text-center text-gray-600 mt-6">

                Already have an account?

                <a
                    href="/login"
                    class="text-blue-600 font-semibold hover:underline">

                    Login

                </a>

            </p>

        </form>
    </div>
</div>
