
<div class="bg-gradient-to-br from-blue-100 via-slate-100 to-indigo-200 min-h-screen flex items-center justify-center p-5">

    <div class="w-full max-w-md">

        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-blue-600 rounded-full flex items-center justify-center mx-auto shadow-lg">
                <span class="text-3xl text-white font-bold">A</span>
            </div>

            <h1 class="text-3xl font-bold text-gray-800 mt-4">
                Welcome Back
            </h1>

            <p class="text-gray-500 mt-2">
                Sign in to continue to your account
            </p>
        </div>
        <div class="bg-white rounded-2xl shadow-2xl p-8">

            <form [formGroup]="userForm" (ngSubmit)="this.login()" class="space-y-6" >

                <!-- Email -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        Email Address
                    </label>

                    <input type="email" placeholder="john@example.com"
                    formControlName="email"
                        class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
                </div>

                <!-- Password -->
                <div class="relative">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        Password
                    </label>

                    <input [type]="showPassword ? 'text' : 'password'" formControlName="password" placeholder="••••••••"
                        class="relative pr-0 border w-full border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
                    <button type="button" (click)="showPassword = !showPassword"
                        class="absolute text-gray-100  mt-6 justify-start items-center hover:text-gray-500 transition-colors">
                        <i class="fa-solid absolute right-3 top-1/2 -translate-y-1/2  cursor-pointer" [class.fa-eye]="!showPassword"
                            [class.fa-eye-slash]="showPassword">
                        </i>

                    </button>
                </div>

                <!-- Remember -->
                <div class="flex justify-between items-center">

                    <label class="flex items-center gap-2 text-sm text-gray-600">
                        <input type="checkbox" class="rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                        Remember Me
                    </label>

                    <a href="#" class="text-sm text-blue-600 hover:text-blue-800 font-medium">
                        Forgot Password?
                    </a>

                </div>

                <!-- Login Button -->
                <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-semibold transition duration-300 shadow-lg hover:shadow-xl">
                    Sign In
                </button>

            </form>
            <!-- Footer -->
            <p class="text-center mt-8 text-gray-600">
                Don't have an account?

                <a routerLink="/register" class="text-blue-600 font-semibold hover:underline">
                    Create Account
                </a>
            </p>
        </div>
    </div>
