<div class="min-h-screen bg-gray-100 p-6">

    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden">

        <!-- Header -->
        <div class="bg-gradient-to-r from-blue-600 to-purple-600 h-36 relative">

            <img src="https://ui-avatars.com/api/?name={{user.name}}&size=150" alt="Profile"
                class="w-32 h-32 rounded-full border-4 border-white absolute left-8 top-16">

        </div>

        <!-- Profile Details -->
        <div class="pt-20 px-8 pb-8">

            <div class="flex justify-between items-center">

                <div>

                    <h1 class="text-3xl font-bold text-gray-800">
                        {{ user.name }}
                    </h1>
                    <p class="text-gray-500">
                        {{ user.email }}
                    </p>

                    <p class="text-sm text-blue-600 mt-1">
                        {{ isAdmin ? 'Administrator' : 'User' }}
                    </p>

                </div>
                <p class="text-center mt-8 text-gray-600">
                    
<!-- (click)="redirect()" -->
                    <a routerLink="/home" class="text-blue-600 font-semibold hover:underline cursor-pointer">
                        Back to Dashboard
                    </a>
                </p>
                <button (click)="isEdit = !isEdit"
                    class="bg-blue-600 text-white px-5 py-2 rounded-lg hover:bg-blue-700">

                    {{ isEdit ? 'Cancel' : 'Edit Profile' }}

                </button>

            </div>

            <!-- User Information -->

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-8">

                <div>
                    <label class="text-gray-500">Phone Number</label>

                    <p class="text-lg font-medium">
                        {{ user.phoneNo }}
                    </p>
                </div>

                <div>
                    <label class="text-gray-500">Age</label>

                    <p class="text-lg font-medium">
                        {{ user.age }}
                    </p>
                </div>

                <div>
                    <label class="text-gray-500">Gender</label>

                    <p class="text-lg font-medium">
                        {{ user.gender }}
                    </p>
                </div>

                <div>
                    <label class="text-gray-500">Joined Date</label>

                    <p class="text-lg font-medium">
                        <!-- {{ user.createdAt | date:'dd-MM-yyyy' }} -->
                    </p>
                </div>

            </div>

            <!-- Edit Form -->

            @if(isEdit) {

            <form class="mt-10 border-t pt-8" (ngSubmit)="updateProfile()">

                <h2 class="text-xl font-semibold mb-6">
                    Edit Profile
                </h2>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">

                    <input type="text" /* [(ngModel)]="user.name" */ name="name" placeholder="Name"
                        class="border rounded-lg px-4 py-3">

                    <input type="email" /* [(ngModel)]="user.email" */ name="email" placeholder="Email"
                        class="border rounded-lg px-4 py-3">

                    <input type="text" /* [(ngModel)]="user.phoneNo" */ name="phoneNo" placeholder="Phone Number"
                        class="border rounded-lg px-4 py-3">

                    <input type="number" /* [(ngModel)]="user.age" */ name="age" placeholder="Age"
                        class="border rounded-lg px-4 py-3">

                </div>

                <button type="submit" class="mt-6 bg-green-600 text-white px-6 py-3 rounded-lg hover:bg-green-700">

                    Save Changes

                </button>

            </form>

            }

        </div>

    </div>

</div>
