<div class="min-h-screen bg-gray-100 flex items-center justify-center p-6">

    <div class="w-full max-w-lg bg-white rounded-2xl shadow-xl p-8">

        <!-- Header -->
        <div class="text-center mb-8">

            <div class="w-16 h-16 mx-auto bg-blue-100 rounded-full flex items-center justify-center">

                <i class="fa-solid fa-lock text-2xl text-blue-600"></i>

            </div>

            <h1 class="mt-4 text-3xl font-bold text-gray-800">
                Update Password
            </h1>

            <p class="mt-2 text-gray-500">
                Change your password to keep your account secure.
            </p>

        </div>

        <!-- Form -->
        <form class="space-y-5">

            <!-- Current Password -->
            <div>

                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Current Password
                </label>

                <div class="relative">

                    <input
                       [type]="showCurPassword ? 'text' : 'password'"
                        placeholder="Enter current password"
                        class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">

                     <button type="button" (click)="showCurPassword = !showCurPassword"
                        class="absolute text-gray-100  mt-6 justify-start items-center hover:text-gray-500 transition-colors">
                        <i class="fa-solid absolute right-3 top-1/2 -translate-y-1/2  cursor-pointer" [class.fa-eye]="!showCurPassword"
                            [class.fa-eye-slash]="showCurPassword">
                        </i>

                    </button>

                </div>

            </div>

            <!-- New Password -->
            <div>

                <label class="block text-sm font-medium text-gray-700 mb-2">
                    New Password
                </label>

                <div class="relative">

                    <input
                        [type]="showNPassword ? 'text' : 'password'"
                        placeholder="Enter new password"
                        class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">

                    <button type="button" (click)="showNPassword = !showNPassword"
                        class="absolute text-gray-100  mt-6 justify-start items-center hover:text-gray-500 transition-colors">
                        <i class="fa-solid absolute right-3 top-1/2 -translate-y-1/2  cursor-pointer" [class.fa-eye]="!showNPassword"
                            [class.fa-eye-slash]="showNPassword">
                        </i>

                    </button>

                </div>

            </div>

            <!-- Confirm Password -->
            <div>

                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Confirm Password
                </label>

                <div class="relative">

                    <input
                        [type]="showCnfPassword ? 'text' : 'password'"
                        placeholder="Confirm new password"
                        class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">

                     <button type="button" (click)="showCnfPassword = !showCnfPassword"
                        class="absolute text-gray-100  mt-6 justify-start items-center hover:text-gray-500 transition-colors">
                        <i class="fa-solid absolute right-3 top-1/2 -translate-y-1/2  cursor-pointer" [class.fa-eye]="!showCnfPassword"
                            [class.fa-eye-slash]="showCnfPassword">
                        </i>

                    </button>

                </div>

            </div>

            <!-- Password Rules -->
            <div class="bg-gray-50 rounded-xl p-4 text-sm text-gray-600">

                <p class="font-semibold mb-2">
                    Password requirements:
                </p>

                <ul class="list-disc list-inside space-y-1">

                    <li>Minimum 8 characters</li>
                    <li>At least one uppercase letter</li>
                    <li>At least one number</li>
                    <li>At least one special character</li>

                </ul>

            </div>

            <!-- Buttons -->
            <div class="flex gap-4 pt-4">

                <button
                    type="button"
                    class="flex-1 py-3 rounded-xl border border-gray-300 font-medium hover:bg-gray-100 transition">

                    Cancel

                </button>

                <button
                    type="submit"
                    class="flex-1 py-3 rounded-xl bg-blue-600 text-white font-medium hover:bg-blue-700 transition">

                    Update Password
                </button>

            </div>

        </form>

    </div>

</div>
