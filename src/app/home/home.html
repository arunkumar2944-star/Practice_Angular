<!-- ================= NAVBAR ================= -->
<header class="fixed top-0 left-0 right-0 h-16 bg-white border-b border-gray-200 shadow-sm z-50">

    <div class="h-full flex items-center justify-between px-6">

        <!-- Logo -->
        <div class="flex items-center gap-3">

            <img src="/BDicon.png" class="w-10 h-10 rounded-lg shadow" alt="Logo">

            <div>
                <h1 class="text-xl font-bold text-gray-800">
                    My Notes
                </h1>

                <p class="text-xs text-gray-500">
                    Personal Workspace
                </p>
            </div>

        </div>

        <!-- Right Side -->
        <div class="flex items-center gap-6">

            <!-- Search -->
            <div class="hidden md:block">

                <input type="text" placeholder="Search notes..."
                    class="w-72 rounded-lg border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">

            </div>

            <!-- Notification -->
            <button class="relative text-gray-600 hover:text-blue-600 cursor-pointer">

                🔔

                <span
                    class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full text-xs h-5 w-5 flex items-center justify-center">
                    3
                </span>

            </button>

            <!-- User -->
            <div class="profile-menu relative flex items-center gap-3 cursor-pointer">
                <button (click)="showMenu=!showMenu" class="hover:cursor-pointer">
                    <img src="https://ui-avatars.com/api/?name={{user?.name}}" class="w-10 h-10 rounded-full">
                </button>
                <div class="hidden md:block">

                    <h3 class="font-semibold text-gray-800">
                        {{user?.name}}
                    </h3>
                    @if(isAdmin){
                    <p class="text-sm text-gray-500">
                        Role : Administrator
                    </p>
                    }
                    @if(showMenu){
                    <div class="absolute right-0 mt-2 w-48 bg-white border rounded-lg shadow-lg">

                        <button class="w-full text-left px-4 py-3 hover:bg-gray-200 cursor-pointer"
                            (click)="goToProfile()">

                            👤 Profile

                        </button>
                        <button class="w-full text-left px-4 py-3 hover:bg-gray-200 cursor-pointer" (click)="updatePwd()" >

                            🔒 Change Password

                        </button>
                        <button class="w-full text-left px-4 py-3 text-red-600 hover:bg-gray-200 cursor-pointer"
                            (click)="logout()">

                            🚪 Logout

                        </button>

                    </div>
                    }



                </div>

            </div>

        </div>

    </div>

</header>

<!-- ================= MAIN LAYOUT ================= -->

<router-outlet></router-outlet>
 </div>
