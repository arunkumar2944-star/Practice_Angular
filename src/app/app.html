@if (users.length>0) {
<nav class="fixed h-17 top-0 w-full ml-0 z-50">
  <ul
    class="h-17 flex items-center w-full  px-5 py-2 text-emerald-50 bg-gray-600 justify-between shadow shadow-gray-400">
    <li class="flex gap-2  items-center">
      <img src="/BDicon.png" alt="Logo" class="w-8 h-8" />
      <h1 class="text-xl font-semibold ">My Notes</h1>
    </li>
    <li class="text-xl font-semibold">Welcome Arun</li>

  </ul>
</nav>
<section class="mt-16 flex w-full ml-0">

  <nav class="w-3xs py-5 min-w-3xs sticky top-16 h-[calc(100vh-4rem)]  text-emerald-50 bg-gray-600">
    <app-side-bar></app-side-bar>
  </nav>
  <main class="p-5 w-full">
    <router-outlet></router-outlet>
  </main>
</section>
}
@else {
<div class="h-screen flex items-center justify-center border bg-amber-100">

  <form class="w-4xl h-auto p-3 border-blue-400 border-8 align-middle rounded-2xl">
    <H1 class="flex justify-center underline text-2xl font-extrabold font-serif text-pink-500">Login.....</H1>
    <div class="mt-2 p-2 h-44 w-full justify-center">
      <div class="flex w-full items-center justify-center mt-5">
        <label for="UserID" class="items-center text-center w-28">UserID :</label>
        <input type="text" name="userID : " placeholder="Enter UserID"
          class="border rounded-lg px-4 py-2 pr-10 p-3 w-2xl" type="text">
      </div>

      <div class="flex w-full items-center justify-center mt-5">
        <label for="UserID" class="items-center text-center w-28">Password :</label>
        <div class="relative">
          <input [type]="showPassword ? 'text' : 'password'" class=" border rounded-lg px-4 py-2 pr-10 p-3 w-2xl mr-2"
            placeholder="Enter the Password" />

          <button type="button" (click)="showPassword = !showPassword"
            class="absolute inset-y-0 right-3 flex items-center">
            <i class="fa-solid absolute right-3 top-1/2 -translate-y-1/2 cursor-pointer" [class.fa-eye]="!showPassword"
              [class.fa-eye-slash]="showPassword">
            </i>
          </button>
        </div>


      </div>


    </div>

    <div class="mt-2 p-2 flex w-full  justify-center">
      <button class="border rounded-md p-3 mt-auto bg-amber-400 hover:bg-amber-600 mr-2">Login </button>
      <button class="border rounded-md p-3 mt-auto bg-amber-400 hover:bg-amber-600">Reset </button>
    </div>
    <div class="mt-2 p-2 flex w-full justify-center">
      <a class="items-center mr-2 font-extrabold text-blue-500 underline" href="">New User ? ....</a>
      <a class="items-center ml-2  text-blue-500 font-extrabold underline" href="">Forgot Password? ....</a>
    </div>

  </form>
</div>
}
