<div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-6">

    <!-- Header -->

    <div class="flex justify-between items-center mb-6">

        <div>

            <h2 class="text-xl font-bold text-slate-800">

                Recent Activity

            </h2>

            <p class="text-sm text-gray-500">

                Your latest actions

            </p>

        </div>

        <div
            class="w-12 h-12 rounded-2xl bg-indigo-100 text-indigo-600 flex items-center justify-center">

            <i class="fa-solid fa-clock-rotate-left"></i>

        </div>

    </div>

    <!-- Empty state -->

    @if (activities.length === 0) {

    <div class="text-center py-8">

        <i class="fa-solid fa-inbox text-5xl text-gray-300"></i>

        <p class="text-gray-500 mt-4">

            No recent activity

        </p>

    </div>

    }

    <!-- Timeline -->

    @for (activity of activities; track activity.id) {

    <div class="flex gap-4 mb-5">

        <div
            class="w-12 h-12 rounded-full flex items-center justify-center"
            [class]="getColor(activity.type)">

            <i [class]="getIcon(activity.type)"></i>

        </div>

        <div class="flex-1">

            <h3 class="font-semibold text-slate-800">

                {{ activity.title }}

            </h3>

            <p class="text-sm text-gray-500">

                {{ activity.type | titlecase }}

            </p>

            <p class="text-xs text-gray-400 mt-1">

                {{ activity.date | date:'dd MMM yyyy, hh:mm a' }}

            </p>

        </div>

    </div>

    }

</div>
