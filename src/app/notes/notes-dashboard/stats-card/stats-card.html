<div
    class="group bg-white rounded-3xl shadow-sm hover:shadow-2xl transition-all duration-300 p-6 border border-slate-200 hover:-translate-y-5">

    <div class="flex justify-between items-start">

        <!-- Left -->

        <div>

            <p class="text-sm font-medium text-gray-500">

                {{ title }}

            </p>

            <h2 class="text-4xl font-bold text-slate-800 mt-3">

                {{ value }}

            </h2>

            <div class="mt-4 flex items-center gap-2">

                <span [class.text-green-600]="growth >= 0" [class.text-red-600]="growth < 0">

                    {{ growth }}%
                    @if (growth >= 0) {
                    <i class="fa-solid fa-arrow-trend-up text-green-600"></i>
                    } @else {
                    <i class="fa-solid fa-arrow-trend-down text-red-600"></i>
                    }
                </span>

                <span class="text-gray-400 text-sm">

                    {{ description }}

                </span>

            </div>

        </div>

        <!-- Right -->

        <div class="w-16 h-16 rounded-2xl flex items-center justify-center text-3xl transition-transform duration-300 group-hover:scale-110"
            [class]="bgColor">

            <i [class]="icon"></i>

        </div>

    </div>

</div>
