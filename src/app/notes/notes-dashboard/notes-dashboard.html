<div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6">

    <app-stats-card
        title="Total Notes"
        [value]="stats().total.count"
        icon="fa-solid fa-note-sticky"
        bgColor="bg-indigo-300"
        textColor="text-indigo-600"
        [growth]="stats().total.growth"
        description="from last week">
    </app-stats-card>

    <app-stats-card
        title="Favorites"
        [value]="stats().favorite.count"
        icon="fa-solid fa-star"
        bgColor="bg-yellow-100"
        textColor="text-yellow-600"
        [growth]="stats().favorite.growth"
        description="bookmarked">
    </app-stats-card>

    <app-stats-card
        title="Pinned"
        [value]="stats().pinned.count"
        icon="fa-solid fa-thumbtack"
        bgColor="bg-emerald-100"
        textColor="text-emerald-600"
        [growth]="stats().pinned.growth"
        description="important">
    </app-stats-card>

    <app-stats-card
        title="Archived"
        [value]="stats().archived.count"
        icon="fa-solid fa-box-archive"
        bgColor="bg-rose-100"
        textColor="text-rose-600"
        [growth]="stats().archived.growth"
        description="old notes">
    </app-stats-card>

</div>
<div class="bg-white rounded-3xl shadow-sm mt-4 p-8">

    <div class="relative">

        <i class="fa-solid fa-magnifying-glass
                  absolute left-4 top-1/2
                  -translate-y-1/2
                  text-gray-400">
        </i>

        <input
            type="text"
            placeholder="Search notes..."
            (input)="onSearch($event)"
            class="w-full pl-12 pr-4 py-3
                   border border-gray-200
                   rounded-2xl
                   focus:outline-none
                   focus:ring-2
                   focus:ring-indigo-500">

    </div>

</div>
 <app-note-grid
 [notesList]="filteredNotes()"
 >

 </app-note-grid>
<div class="mt-3 text-sm text-gray-500">

    Found {{ filteredNotes().length }}

    of {{ notesList().length }} notes

</div>
<div class="grid grid-cols-1 xl:grid-cols-2 gap-6 mt-8">

    <app-reminder-widget
        [reminders]="upcomingReminders()">
    </app-reminder-widget>

    <app-recent-activity
        [activities]="recentActivities()">
    </app-recent-activity>

</div>
