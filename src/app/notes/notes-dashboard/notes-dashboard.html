<div class="min-h-screen bg-gray-50 p-6">

    <!-- Search + Profile -->

    <div class="flex flex-col lg:flex-row gap-4 justify-between mb-6">

        <div class="relative flex-1">

            <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>

            <input type="text" placeholder="Search notes..." (input)="onSearch($event)"
                class="w-full pl-12 pr-4 py-3 bg-white border border-gray-200 rounded-2xl shadow-sm outline-none focus:ring-2 focus:ring-blue-500">

        </div>



    </div>

    <!-- Stats Cards -->

    <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-6 mb-6">

        <app-stats-card title="Total Notes" [value]="stats().total.count" icon="fa-solid fa-note-sticky"
            iconcolor="bg-indigo-300 " textColor="text-indigo-600" [growth]="stats().total.growth"
            description="from last week">
        </app-stats-card>

        <app-stats-card title="Favorites" [value]="stats().favorite.count" icon="fa-solid fa-star"
            bgColor="bg-yellow-100" textColor="text-yellow-600" [growth]="stats().favorite.growth"
            description="bookmarked">
        </app-stats-card>

        <app-stats-card title="Pinned" [value]="stats().pinned.count" icon="fa-solid fa-thumbtack"
            bgColor="bg-emerald-100" textColor="text-emerald-600" [growth]="stats().pinned.growth"
            description="important">
        </app-stats-card>

        <app-stats-card title="Archived" [value]="stats().archived.count" icon="fa-solid fa-box-archive"
            bgColor="bg-rose-100" textColor="text-rose-600" [growth]="stats().archived.growth" description="old notes">
        </app-stats-card>

    </div>
    <div>

        <div class="mt-3 text-xl" [ngClass]="{
    'text-gray-500': searchText.length === 0,
    'text-green-500 bg-green-300': searchText.length > 0 && filteredNotes().length > 0,
    'text-red-500 bg-red-300': searchText.length > 0 && filteredNotes().length === 0
}">

            <p>Found {{ filteredNotes().length }}

                of {{ notesList().length }} notes</p>

        </div>

    </div>
    <app-note-grid [notesList]="filteredNotes()">

    </app-note-grid>





    <!-- Bottom Section -->

    <div class="grid grid-cols-1 xl:grid-cols-2 gap-6 mt-6">

    <!-- LEFT COLUMN -->

    <div class="space-y-6">

        <!-- CALENDAR -->

        <div class="bg-white rounded-3xl shadow-sm border border-gray-100">

            <button
                class="w-full p-5 flex items-center justify-between"
                (click)="toggleCalendar()">

                <div class="flex items-center gap-3">

                    <div class="w-10 h-10 rounded-xl bg-blue-100 flex items-center justify-center">

                        <i class="fa-solid fa-calendar-days text-blue-600"></i>

                    </div>

                    <div class="text-left">

                        <h2 class="font-bold text-gray-800">
                            Calendar
                        </h2>

                        <p class="text-sm text-gray-500">
                            Monthly view
                        </p>

                    </div>

                </div>

                <i
                    class="fa-solid transition-transform duration-300"
                    [class.fa-chevron-down]="showCalendar()"
                    [class.fa-chevron-right]="!showCalendar()">
                </i>

            </button>

            @if (showCalendar()) {

                <div class="px-5 pb-5">

                    <app-note-calendar
                        [reminders]="upcomingReminders()">
                    </app-note-calendar>

                </div>

            }

        </div>

        <!-- WEEKLY PRODUCTIVITY -->

        <div class="bg-white rounded-3xl shadow-sm border border-gray-100">

            <button
                class="w-full p-5 flex items-center justify-between"
                (click)="toggleWeeklyProductivity()">

                <div class="flex items-center gap-3">

                    <div class="w-10 h-10 rounded-xl bg-green-100 flex items-center justify-center">

                        <i class="fa-solid fa-chart-column text-green-600"></i>

                    </div>

                    <div class="text-left">

                        <h2 class="font-bold text-gray-800">
                            Weekly Productivity
                        </h2>

                        <p class="text-sm text-gray-500">
                            Last 7 days
                        </p>

                    </div>

                </div>

                <i
                    class="fa-solid transition-transform duration-300"
                    [class.fa-chevron-down]="showWeeklyProductivity()"
                    [class.fa-chevron-right]="!showWeeklyProductivity()">
                </i>

            </button>

            @if (showWeeklyProductivity()) {

                <div class="px-5 pb-5">

                    <app-weekly-productivity>

                    </app-weekly-productivity>

                </div>

            }

        </div>

    </div>

    <!-- RIGHT COLUMN -->

    <div class="space-y-6">

        <!-- REMINDERS -->

        <div class="bg-white rounded-3xl shadow-sm border border-gray-100">

            <button
                class="w-full p-5 flex items-center justify-between"
                (click)="toggleReminders()">

                <div class="flex items-center gap-3">

                    <div class="w-10 h-10 rounded-xl bg-orange-100 flex items-center justify-center">

                        <i class="fa-solid fa-bell text-orange-600"></i>

                    </div>

                    <div class="text-left">

                        <h2 class="font-bold text-gray-800">
                            Upcoming Reminders
                        </h2>

                        <p class="text-sm text-gray-500">
                            {{ upcomingReminders().length }} reminders
                        </p>

                    </div>

                </div>

                <i
                    class="fa-solid transition-transform duration-300"
                    [class.fa-chevron-down]="showReminders()"
                    [class.fa-chevron-right]="!showReminders()">
                </i>

            </button>

            @if (showReminders()) {

                <div class="px-5 pb-5">

                    <app-reminder-widget
                        [reminders]="upcomingReminders()">
                    </app-reminder-widget>

                </div>

            }

        </div>

        <!-- RECENT ACTIVITIES -->

        <div class="bg-white rounded-3xl shadow-sm border border-gray-100">

            <button
                class="w-full p-5 flex items-center justify-between"
                (click)="toggleActivities()">

                <div class="flex items-center gap-3">

                    <div class="w-10 h-10 rounded-xl bg-purple-100 flex items-center justify-center">

                        <i class="fa-solid fa-clock-rotate-left text-purple-600"></i>

                    </div>

                    <div class="text-left">

                        <h2 class="font-bold text-gray-800">
                            Recent Activities
                        </h2>

                        <p class="text-sm text-gray-500">
                            {{ recentActivities().length }} activities
                        </p>

                    </div>

                </div>

                <i
                    class="fa-solid transition-transform duration-300"
                    [class.fa-chevron-down]="showActivities()"
                    [class.fa-chevron-right]="!showActivities()">
                </i>

            </button>

            @if (showActivities()) {

                <div class="px-5 pb-5">

                    <app-recent-activity
                        [activities]="recentActivities()">
                    </app-recent-activity>

                </div>

            }

        </div>

    </div>

</div>

</div>
