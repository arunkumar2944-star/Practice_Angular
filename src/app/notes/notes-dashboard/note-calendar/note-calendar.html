 <div class="bg-white rounded-3xl p-6 shadow-sm border border-gray-100">

                <!-- Header -->

                <div class="flex items-center justify-between mb-6">

                    <div>

                        <h2 class="text-2xl font-bold text-slate-800">
                            Calendar
                        </h2>

                        <p class="text-sm text-slate-500">

                            {{ monthName }}

                        </p>

                    </div>

                    <div class="flex gap-2">

                        <button (click)="previousMonth()" class="w-10 h-10 rounded-xl bg-slate-100 hover:bg-slate-200">

                            <i class="fa-solid fa-chevron-left"></i>

                        </button>

                        <button (click)="nextMonth()"
                            class="w-10 h-10 rounded-xl bg-blue-100 text-blue-600 hover:bg-blue-200">

                            <i class="fa-solid fa-chevron-right"></i>

                        </button>

                    </div>

                </div>

                <!-- Week names -->

                <div class="grid grid-cols-7 gap-2 mb-4">

                    @for (day of weekDays; track day) {

                    <div class="text-center text-sm font-semibold text-slate-500">

                        {{ day }}

                    </div>

                    }

                </div>

                <!-- Dates -->

                <div class="grid grid-cols-7 gap-2">

                    @for (date of calendarDays; track $index) {

                    <button [disabled]="date.day === null"
                        class="aspect-square rounded-xl flex items-center justify-center relative transition-all"
                        [ngClass]="{

                    'opacity-0 cursor-default': date.day === null,

                    'bg-blue-600 text-white shadow-lg':
                        date.isToday,

                    'bg-orange-100 text-orange-700':
                        date.hasReminder,

                    'hover:bg-slate-100':
                        !date.isToday &&
                        !date.hasReminder &&
                        date.day !== null

                }">

                        {{ date.day }}

                        @if (date.hasReminder && !date.isToday) {

                        <span class="absolute bottom-1 w-1.5 h-1.5 rounded-full bg-orange-500">
                        </span>

                        }

                    </button>

                    }

                </div>

            </div>
