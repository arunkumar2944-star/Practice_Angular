            <!-- Filters -->

            <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-8">

                <div>

                    <h1 class="text-4xl font-bold text-gray-800">
                        My Notes
                    </h1>

                    <p class="text-gray-500 mt-2">
                        Organize your thoughts and tasks.
                    </p>

                </div>

                <button (click)="noteAdd()"
                    class="px-6 py-3 bg-blue-600 text-white rounded-xl shadow-lg hover:bg-blue-700 transition">

                    + Add Note

                </button>

            </div>


            <!-- Tabs -->

            <div class="flex gap-4 mb-8 overflow-x-auto">



                <button (click)="loadAllNotes()" [ngClass]="{
            'bg-indigo-600 text-white': selectedTab() === 'all',
            'bg-white shadow text-gray-700': selectedTab() !== 'all'
        }" class="px-5 py-2 rounded-full transition-all duration-300">

                    All

                </button>

                <button (click)="loadFavorite()" [ngClass]="{
            'bg-yellow-500 text-white': selectedTab() === 'favorite',
            'bg-white shadow text-gray-700': selectedTab() !== 'favorite'
        }" class="px-5 py-2 rounded-full transition-all duration-300">

                    Favorites

                </button>

                <button (click)="loadPinned()" [ngClass]="{
            'bg-green-500 text-white': selectedTab() === 'pinned',
            'bg-white shadow text-gray-700': selectedTab() !== 'pinned'
        }" class="px-5 py-2 rounded-full transition-all duration-300">

                    Pinned

                </button>

                <button (click)="loadReminded()" [ngClass]="{
            'bg-red-500 text-white': selectedTab() === 'reminded',
            'bg-white shadow text-gray-700': selectedTab() !== 'reminded'
        }" class="px-5 py-2 rounded-full transition-all duration-300">

                    Reminded

                </button>
            </div>

            <!-- Notes Grid -->

            <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">

                @for (note of displayedNotes; track note._id) {

                <div
                    class="bg-white rounded-3xl p-6 shadow hover:shadow-2xl transition duration-300 hover:-translate-y-1">

                    <div class="flex justify-between items-start">

                        <div>

                            <h3 class="text-2xl font-bold text-slate-800 line-clamp-1">

                                {{ note.title }}

                            </h3>

                            <span
                                class="inline-block mt-2 px-3 py-1 rounded-full bg-indigo-100 text-indigo-600 text-sm">

                                {{ note.category }}

                            </span>

                        </div>

                        <button class="text-2xl">

                            ⋮

                        </button>

                    </div>

                    <p class="text-gray-600 mt-5 line-clamp-3">

                        {{ note.details }}

                    </p>

                    <div class="flex gap-2 flex-wrap mt-5">

                        <span class="px-3 py-1 bg-gray-100 rounded-full text-sm">

                            #angular

                        </span>

                        <span class="px-3 py-1 bg-gray-100 rounded-full text-sm">

                            #node

                        </span>

                    </div>

                    <div class="border-t mt-6 pt-4">

                        <div class="text-sm text-gray-500">

                            📅 {{ note.date | date:'dd MMM yyyy' }}

                        </div>

                        <div class="flex justify-between mt-5">

                            <div class="flex gap-3 text-xl">

                                ⭐ 📌

                            </div>

                            <div class="flex gap-3">

                                <button class="bg-amber-500 text-white px-4 py-2 rounded-xl">

                                    Edit

                                </button>

                                <button class="bg-red-500 text-white px-4 py-2 rounded-xl">

                                    Delete

                                </button>

                            </div>

                        </div>

                    </div>

                </div>

                }

            </div>

        </div>
        <div class="w-full flex-2 justify-center text-center">
            <button (click)="showAll = !showAll"
                class="w-2xs justify-between text-center px-4 py-2 bg-indigo-600 text-white rounded-lg">

                {{ showAll ? 'Show Less' : 'View All' }}

            </button>
            <br>
            <br>
        </div>
